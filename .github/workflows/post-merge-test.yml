name: Post-Merge Tests

# Runs the full test suite on main after PRs merge.
# Engine-specific test commands are configured in justfile.engine.

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.claude/**'
      - '.ai/**'
      - 'docs/**'

concurrency:
  group: post-merge-tests
  cancel-in-progress: true

jobs:
  test:
    name: Post-Merge Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint Python tools
        run: uv run ruff check scripts/tools/

      - name: Check line limits
        run: bash scripts/tools/check_line_limit.sh

      - name: Validate system registry
        run: uv run python scripts/tools/validate_registry.py
