name: Unity Lint

on:
  workflow_call:

jobs:
  csharp-lint:
    name: C# Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check C# formatting
        run: |
          # Find any .sln file generated by Unity, or use dotnet format on individual projects
          if ls *.sln 1>/dev/null 2>&1; then
            dotnet format *.sln --verify-no-changes --verbosity diagnostic
          else
            echo "No .sln file found — skipping dotnet format (open project in Unity to generate)"
          fi

      - name: Check for common issues
        run: |
          # Check for Debug.Log left in production code (should use structured logging)
          echo "Checking for bare Debug.Log statements..."
          if grep -rn "Debug\.Log(" Assets/Scripts/ --include="*.cs" | grep -v "// DEBUG" | grep -v "#if.*DEBUG"; then
            echo "::warning::Found Debug.Log statements without DEBUG guards in production code"
          fi

          # Check for TODO/FIXME/HACK comments
          echo "Checking for TODO/FIXME/HACK..."
          grep -rn "TODO\|FIXME\|HACK" Assets/Scripts/ --include="*.cs" || true

  meta-file-check:
    name: Meta File Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for missing .meta files
        run: |
          missing=0
          # Every file and directory in Assets/ must have a .meta file
          find Assets/ -not -name "*.meta" -not -path "*/\.*" | while read -r item; do
            if [ ! -f "${item}.meta" ]; then
              echo "::error::Missing .meta file for: ${item}"
              missing=1
            fi
          done

          # Check for orphaned .meta files (meta without corresponding asset)
          find Assets/ -name "*.meta" | while read -r meta; do
            asset="${meta%.meta}"
            if [ ! -e "$asset" ]; then
              echo "::warning::Orphaned .meta file (no matching asset): ${meta}"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Missing .meta files detected. Open project in Unity Editor to generate them."
            exit 1
          fi
