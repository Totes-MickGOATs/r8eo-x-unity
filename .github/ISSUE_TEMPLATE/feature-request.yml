name: Feature Request
description: Request a new feature with structured data for AI agent implementation
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: system
    attributes:
      label: System
      options:
        - Vehicle/Physics
        - Input
        - Camera
        - Track
        - UI
        - Core
        - Editor
        - New System
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
        - Nice-to-have
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What the feature should do.
      placeholder: "Add a telemetry overlay that shows real-time suspension travel..."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Bullet list of conditions that define "done".
      placeholder: |
        - [ ] Suspension travel displayed per wheel
        - [ ] Toggle with F3 key
        - [ ] Does not affect frame rate by more than 1ms

  - type: textarea
    id: technical-hints
    attributes:
      label: Technical hints
      description: Any implementation ideas, relevant existing code, or architectural notes.
      placeholder: "Could extend the existing TuningPanel system in Assets/Scripts/UI/..."

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What must exist or be completed first.
      placeholder: "Requires the suspension system refactor from #42"
